<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Entrepreneurs - Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-deep:#5aa9dc;
    --blue-mid:#8fc7ea;
    --blue-light:#bfe0f5;
    --blue-pale:#e4f3fb;
    --navy:#0e2f52;
    --accent-cyan:#29b6ea;
    --white:#ffffff;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:#1a2733;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Barlow', sans-serif;
  }

  .phone{
    position:relative;
    width:375px;
    height:812px;
    border-radius:44px;
    overflow:hidden;
    box-shadow:0 40px 80px rgba(0,0,0,.5), 0 0 0 10px #0b1218;
    background:
      radial-gradient(circle at 50% 40%, var(--blue-pale) 0%, var(--blue-light) 32%, var(--blue-mid) 62%, var(--blue-deep) 100%);
  }

  /* soft bottom fade to give the vertical gradient feel from the reference */
  .phone::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,
      rgba(143,199,234,0) 0%,
      rgba(143,199,234,0) 55%,
      rgba(200,228,246,.55) 78%,
      rgba(228,243,251,.85) 100%);
    pointer-events:none;
  }

  .screen{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:2;
  }

  /* placeholder bars top & bottom, matching reference mock */
  .bar{
    height:22px;
    background:var(--white);
    border-radius:12px;
    box-shadow:0 6px 14px rgba(20,60,100,.18);
  }
  .bar.full{ width:calc(100% - 30px); margin:0 auto; }

  .top-bars{
    width:100%;
    padding-top:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .top-bars .bar{ width:calc(100% - 0px); border-radius:0; height:24px; }

  .divider-line{
    width:calc(100% - 30px);
    height:6px;
    background:var(--white);
    border-radius:6px;
    margin:56px auto 0;
    box-shadow:0 4px 10px rgba(20,60,100,.15);
  }

  /* Logo badge */
  .logo-wrap{
    position:relative;
    margin-top:56px;
    width:340px;
    height:340px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .logo-glow{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.95) 0%, rgba(255,255,255,.55) 45%, rgba(255,255,255,0) 72%);
  }
  .logo-circle{
    position:relative;
    width:230px;
    height:230px;
    border-radius:50%;
    background:var(--white);
    box-shadow:0 20px 45px rgba(20,70,120,.22);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .logo-icon{ width:110px; height:auto; margin-bottom:2px; }

  .logo-text{
    text-align:center;
    line-height:1;
  }
  .logo-text .small{
    font-family:'Barlow', sans-serif;
    font-weight:800;
    font-size:34px;
    color:var(--navy);
    letter-spacing:.5px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
  }
  .logo-text .small svg{ width:16px; height:16px; transform:translateY(2px); }
  .logo-text .entrepreneurs{
    font-family:'Barlow', sans-serif;
    font-weight:500;
    font-size:14px;
    color:var(--accent-cyan);
    letter-spacing:1px;
    margin-top:2px;
  }

  /* Skyline */
  .skyline{
    width:100%;
    margin-top:-38px;
    z-index:1;
  }

  /* Tagline */
  .tagline{
    margin-top:auto;
    margin-bottom:110px;
    text-align:center;
  }
  .tagline-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }
  .tagline-line{
    width:64px;
    height:4px;
    background:var(--white);
    border-radius:4px;
  }
  .tagline h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    font-size:26px;
    color:var(--white);
    letter-spacing:.5px;
    text-shadow:0 2px 6px rgba(20,60,100,.15);
  }
  .tagline h2{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    font-size:26px;
    color:var(--white);
    letter-spacing:.5px;
    margin-top:2px;
    text-shadow:0 2px 6px rgba(20,60,100,.15);
  }

  .bottom-bars{
    width:100%;
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-bottom:14px;
  }
  .bottom-bars .bar{ width:100%; border-radius:0; height:24px; }

</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="top-bars">
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="divider-line"></div>

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="logo-circle">
        <svg class="logo-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
          <!-- person head -->
          <circle cx="30" cy="16" r="11" fill="#0e2f52"/>
          <!-- person body / arm curving into arrow -->
          <path d="M14 62 C14 40, 20 32, 34 32 C46 32, 50 26, 56 18" fill="none" stroke="#0e2f52" stroke-width="9" stroke-linecap="round"/>
          <!-- arrow head -->
          <polygon points="56,4 76,10 62,22" fill="#0e2f52"/>
          <!-- bars -->
          <rect x="62" y="46" width="12" height="24" rx="2" fill="#8fc7ea"/>
          <rect x="80" y="34" width="12" height="36" rx="2" fill="#4fa9dd"/>
          <rect x="98" y="20" width="12" height="50" rx="2" fill="#1f7fc0"/>
        </svg>
        <div class="logo-text">
          <div class="small">small
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C7 2 3 6 3 11c0 6 9 11 9 11s9-5 9-11c0-5-4-9-9-9z" fill="#29b6ea"/>
              <path d="M12 6c-1.5 2-1.5 5 0 8" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="entrepreneurs">entrepreneurs</div>
        </div>
      </div>
    </div>

    <svg class="skyline" viewBox="0 0 375 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,110
        L20,110 L20,80 L34,80 L34,60 L34,60 L48,60 L48,95 L60,95 L60,70
        L60,70 L60,50 L60,50 Q64,46 68,50 L68,70 L80,70 L80,105
        L96,105 L96,115 Q100,120 104,115 L108,115 L108,90 L108,90
        L120,90 L120,60 L134,60 L134,100 L148,100 L148,80
        L160,80 L160,55 L172,55 L172,95 Q176,100 180,95 L182,95 L182,110
        L196,110 L196,70 L196,70 L210,70 L210,50 L210,90 L224,90
        L224,105 L238,105 L238,75 L252,75 L252,60 L252,60 L264,60
        L264,95 L278,95 L278,110 Q282,115 286,110 L290,110 L290,80
        L304,80 L304,60 L316,60 L316,100 L330,100 L330,70
        L344,70 L344,90 Q348,95 352,90 L356,90 L356,105 L375,105"
        fill="none" stroke="#0e2f52" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>

    <div class="tagline">
      <div class="tagline-row">
        <div class="tagline-line"></div>
        <h1>Pequeños pasos</h1>
        <div class="tagline-line"></div>
      </div>
      <h2>Grandes logros</h2>
    </div>

    <div class="bottom-bars">
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

  </div>
</div>
<script>
  // Redirigir al hacer clic en cualquier lugar de la pantalla
  document.body.addEventListener('click', () => {
    window.location.href = 'crear-cuenta.html';
  });

  // Redirigir automáticamente después de 3 segundos
  setTimeout(() => {
    window.location.href = 'crear-cuenta.html';
  }, 3000);
</script>

</body>
</html>
